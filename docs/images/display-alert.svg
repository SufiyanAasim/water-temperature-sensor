<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250" role="img" aria-label="LCD showing Temp 30.71 C, ALERT Temp High, buzzer active">
  <rect width="560" height="250" rx="12" fill="#f1f5f9"/>

  <!-- LCD module PCB -->
  <rect x="60" y="45" width="440" height="170" rx="8" fill="#166534"/>
  <!-- Mounting holes -->
  <circle cx="78" cy="63" r="5" fill="#f1f5f9"/>
  <circle cx="482" cy="63" r="5" fill="#f1f5f9"/>
  <circle cx="78" cy="197" r="5" fill="#f1f5f9"/>
  <circle cx="482" cy="197" r="5" fill="#f1f5f9"/>
  <!-- Pin header -->
  <g fill="#facc15">
    <rect x="120" y="50" width="6" height="10"/><rect x="132" y="50" width="6" height="10"/>
    <rect x="144" y="50" width="6" height="10"/><rect x="156" y="50" width="6" height="10"/>
    <rect x="168" y="50" width="6" height="10"/><rect x="180" y="50" width="6" height="10"/>
    <rect x="192" y="50" width="6" height="10"/><rect x="204" y="50" width="6" height="10"/>
  </g>

  <!-- Screen bezel + backlit screen (alert border) -->
  <rect x="95" y="72" width="370" height="118" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="3"/>
  <rect x="103" y="80" width="354" height="102" rx="3" fill="#1d4ed8"/>

  <!-- 16x2 character text -->
  <text x="118" y="122" font-family="Consolas, 'Courier New', monospace" font-size="26" letter-spacing="6" fill="#eff6ff">Temp: 30.71&#176;C</text>
  <text x="118" y="164" font-family="Consolas, 'Courier New', monospace" font-size="24" letter-spacing="2" fill="#fef2f2">ALERT: Temp High</text>

  <!-- Buzzer with sound waves -->
  <circle cx="527" cy="130" r="16" fill="#1e293b"/>
  <circle cx="527" cy="130" r="5" fill="#475569"/>
  <path d="M549 112 a26 26 0 0 1 0 36" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <path d="M557 102 a40 40 0 0 1 0 56" fill="none" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>

  <!-- Status caption -->
  <text x="280" y="238" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" fill="#b91c1c">Above 30&#176;C — buzzer pulsing</text>
</svg>
