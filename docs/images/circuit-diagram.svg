<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Segoe UI, sans-serif" role="img" aria-label="Wiring diagram: Arduino Uno with DS18B20, I2C LCD and buzzer">
  <rect width="920" height="560" rx="12" fill="#f1f5f9"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Water Temperature Sensor — Wiring</text>

  <!-- ================= Arduino Uno ================= -->
  <rect x="50" y="150" width="220" height="290" rx="10" fill="#0e7490"/>
  <text x="160" y="185" text-anchor="middle" font-size="18" font-weight="600" fill="#ffffff">ARDUINO UNO</text>
  <!-- USB -->
  <rect x="30" y="190" width="20" height="40" rx="3" fill="#94a3b8"/>
  <!-- Pins (right edge) -->
  <g font-size="13" fill="#ffffff">
    <rect x="262" y="222" width="16" height="16" fill="#dc2626"/><text x="255" y="235" text-anchor="end">5V</text>
    <rect x="262" y="262" width="16" height="16" fill="#1e293b"/><text x="255" y="275" text-anchor="end">GND</text>
    <rect x="262" y="302" width="16" height="16" fill="#ca8a04"/><text x="255" y="315" text-anchor="end">D2</text>
    <rect x="262" y="342" width="16" height="16" fill="#7c3aed"/><text x="255" y="355" text-anchor="end">D3</text>
    <rect x="262" y="382" width="16" height="16" fill="#16a34a"/><text x="255" y="395" text-anchor="end">A4 (SDA)</text>
    <rect x="262" y="422" width="16" height="16" fill="#2563eb"/><text x="255" y="435" text-anchor="end">A5 (SCL)</text>
  </g>

  <!-- ================= Power rails ================= -->
  <!-- 5V rail (red): from 5V pin, up and across the top -->
  <polyline points="278,230 320,230 320,110 850,110" fill="none" stroke="#dc2626" stroke-width="3"/>
  <text x="330" y="102" font-size="12" fill="#dc2626" font-weight="600">5V</text>
  <!-- GND rail (black): from GND pin, down and across the bottom -->
  <polyline points="278,270 340,270 340,520 850,520" fill="none" stroke="#1e293b" stroke-width="3"/>
  <text x="350" y="540" font-size="12" fill="#1e293b" font-weight="600">GND</text>

  <!-- ================= DS18B20 (TO-92) ================= -->
  <path d="M560 60 a45 45 0 0 1 90 0 l0 30 l-90 0 Z" fill="#1e293b"/>
  <text x="605" y="82" text-anchor="middle" font-size="13" fill="#ffffff">DS18B20</text>
  <!-- Legs -->
  <line x1="580" y1="90" x2="580" y2="130" stroke="#64748b" stroke-width="4"/>
  <line x1="605" y1="90" x2="605" y2="160" stroke="#64748b" stroke-width="4"/>
  <line x1="630" y1="90" x2="630" y2="110" stroke="#64748b" stroke-width="4"/>
  <g font-size="11" fill="#475569">
    <text x="572" y="145" text-anchor="end">GND</text>
    <text x="605" y="178" text-anchor="middle">DATA</text>
    <text x="638" y="105">VDD</text>
  </g>
  <!-- VDD leg touches the 5V rail directly at y=110 -->
  <!-- GND leg down to GND rail -->
  <polyline points="580,130 545,130 545,520" fill="none" stroke="#1e293b" stroke-width="3"/>
  <!-- DATA (yellow) to D2 -->
  <polyline points="605,185 605,310 278,310" fill="none" stroke="#ca8a04" stroke-width="3"/>
  <!-- 4.7k pull-up between DATA node and 5V rail -->
  <line x1="680" y1="185" x2="605" y2="185" stroke="#ca8a04" stroke-width="3"/>
  <rect x="672" y="128" width="16" height="42" rx="3" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
  <line x1="680" y1="110" x2="680" y2="128" stroke="#dc2626" stroke-width="3"/>
  <line x1="680" y1="170" x2="680" y2="185" stroke="#ca8a04" stroke-width="3"/>
  <text x="698" y="155" font-size="12" fill="#92400e" font-weight="600">4.7 k&#937;</text>
  <circle cx="605" cy="185" r="4" fill="#ca8a04"/>

  <!-- ================= Buzzer ================= -->
  <circle cx="440" cy="350" r="34" fill="#1e293b"/>
  <circle cx="440" cy="350" r="10" fill="#475569"/>
  <text x="440" y="410" text-anchor="middle" font-size="13" fill="#475569">Active Buzzer</text>
  <!-- + to D3 (purple) -->
  <polyline points="406,350 278,350" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <text x="390" y="342" font-size="13" fill="#7c3aed" font-weight="700">+</text>
  <!-- - to GND rail -->
  <polyline points="440,384 440,520" fill="none" stroke="#1e293b" stroke-width="3"/>
  <text x="450" y="400" font-size="13" fill="#1e293b" font-weight="700">&#8722;</text>

  <!-- ================= LCD 16x2 (I2C) ================= -->
  <rect x="620" y="330" width="260" height="120" rx="8" fill="#166534"/>
  <rect x="645" y="350" width="210" height="80" rx="4" fill="#1d4ed8"/>
  <text x="750" y="384" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#eff6ff">Temp: 25.50&#176;C</text>
  <text x="750" y="410" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#eff6ff">Temp Normal</text>
  <text x="750" y="472" text-anchor="middle" font-size="13" fill="#475569">16&#215;2 LCD (I2C backpack @ 0x27)</text>
  <!-- I2C pins on left edge -->
  <g font-size="11" fill="#475569">
    <rect x="606" y="342" width="14" height="10" fill="#dc2626"/><text x="585" y="351" text-anchor="end">VCC</text>
    <rect x="606" y="362" width="14" height="10" fill="#1e293b"/><text x="585" y="371" text-anchor="end">GND</text>
    <rect x="606" y="382" width="14" height="10" fill="#16a34a"/><text x="585" y="391" text-anchor="end">SDA</text>
    <rect x="606" y="402" width="14" height="10" fill="#2563eb"/><text x="585" y="411" text-anchor="end">SCL</text>
  </g>
  <!-- VCC up to 5V rail -->
  <polyline points="606,347 850,347 850,110" fill="none" stroke="#dc2626" stroke-width="3"/>
  <!-- GND down to GND rail -->
  <polyline points="606,367 870,367 870,520 850,520" fill="none" stroke="#1e293b" stroke-width="3"/>
  <!-- SDA (green) to A4 -->
  <polyline points="606,387 500,387 500,390 278,390" fill="none" stroke="#16a34a" stroke-width="3"/>
  <!-- SCL (blue) to A5 -->
  <polyline points="606,407 490,407 490,430 278,430" fill="none" stroke="#2563eb" stroke-width="3"/>
</svg>
